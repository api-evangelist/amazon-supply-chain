naftiko: 1.0.0-alpha2
info:
  label: AWS Supply Chain API — Instances
  description: 'AWS Supply Chain API — Instances. 5 operations. Lead operation: Amazon List Instances. Self-contained Naftiko
    capability covering one Amazon Supply Chain business surface.'
  tags:
  - Amazon Supply Chain
  - Instances
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_SUPPLY_CHAIN_API_KEY: AMAZON_SUPPLY_CHAIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-supply-chain-instances
    baseUri: https://scn.amazonaws.com
    description: AWS Supply Chain API — Instances business capability. Self-contained, no shared references.
    resources:
    - name: api-instances
      path: /api/instances
      operations:
      - name: listinstances
        method: GET
        description: Amazon List Instances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          description: Maximum number of results to return
        - name: nextToken
          in: query
          type: string
          description: Pagination token for next page of results
        - name: instanceNameFilter
          in: query
          type: array
          description: Filter by instance names
        - name: instanceStateFilter
          in: query
          type: array
          description: Filter by instance states
      - name: createinstance
        method: POST
        description: Amazon Create Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-instances-instanceId
      path: /api/instances/{instanceId}
      operations:
      - name: getinstance
        method: GET
        description: Amazon Get Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          description: The instance identifier
          required: true
      - name: updateinstance
        method: PATCH
        description: Amazon Update Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          description: The instance identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteinstance
        method: DELETE
        description: Amazon Delete Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          description: The instance identifier
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_SUPPLY_CHAIN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-supply-chain-instances-rest
    port: 8080
    description: REST adapter for AWS Supply Chain API — Instances. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/instances
      name: api-instances
      description: REST surface for api-instances.
      operations:
      - method: GET
        name: listinstances
        description: Amazon List Instances
        call: amazon-supply-chain-instances.listinstances
        with:
          maxResults: rest.maxResults
          nextToken: rest.nextToken
          instanceNameFilter: rest.instanceNameFilter
          instanceStateFilter: rest.instanceStateFilter
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createinstance
        description: Amazon Create Instance
        call: amazon-supply-chain-instances.createinstance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/instances/{instanceid}
      name: api-instances-instanceid
      description: REST surface for api-instances-instanceId.
      operations:
      - method: GET
        name: getinstance
        description: Amazon Get Instance
        call: amazon-supply-chain-instances.getinstance
        with:
          instanceId: rest.instanceId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateinstance
        description: Amazon Update Instance
        call: amazon-supply-chain-instances.updateinstance
        with:
          instanceId: rest.instanceId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteinstance
        description: Amazon Delete Instance
        call: amazon-supply-chain-instances.deleteinstance
        with:
          instanceId: rest.instanceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-supply-chain-instances-mcp
    port: 9090
    transport: http
    description: MCP adapter for AWS Supply Chain API — Instances. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-list-instances
      description: Amazon List Instances
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-supply-chain-instances.listinstances
      with:
        maxResults: tools.maxResults
        nextToken: tools.nextToken
        instanceNameFilter: tools.instanceNameFilter
        instanceStateFilter: tools.instanceStateFilter
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-create-instance
      description: Amazon Create Instance
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-supply-chain-instances.createinstance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-get-instance
      description: Amazon Get Instance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-supply-chain-instances.getinstance
      with:
        instanceId: tools.instanceId
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-update-instance
      description: Amazon Update Instance
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: amazon-supply-chain-instances.updateinstance
      with:
        instanceId: tools.instanceId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-delete-instance
      description: Amazon Delete Instance
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amazon-supply-chain-instances.deleteinstance
      with:
        instanceId: tools.instanceId
      outputParameters:
      - type: object
        mapping: $.
