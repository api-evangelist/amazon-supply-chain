naftiko: 1.0.0-alpha2
info:
  label: AWS Supply Chain API — Bill of Materials
  description: 'AWS Supply Chain API — Bill of Materials. 2 operations. Lead operation: Amazon Create Bill of Materials Import
    Job. Self-contained Naftiko capability covering one Amazon Supply Chain business surface.'
  tags:
  - Amazon Supply Chain
  - Bill of Materials
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_SUPPLY_CHAIN_API_KEY: AMAZON_SUPPLY_CHAIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-supply-chain-bill-of-materials
    baseUri: https://scn.amazonaws.com
    description: AWS Supply Chain API — Bill of Materials business capability. Self-contained, no shared references.
    resources:
    - name: api-instances-instanceId-bill-of-materials-import-jobs
      path: /api/instances/{instanceId}/bill-of-materials-import-jobs
      operations:
      - name: createbillofmaterialsimportjob
        method: POST
        description: Amazon Create Bill of Materials Import Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          description: The instance identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-instances-instanceId-bill-of-materials-import-jobs-jobId
      path: /api/instances/{instanceId}/bill-of-materials-import-jobs/{jobId}
      operations:
      - name: getbillofmaterialsimportjob
        method: GET
        description: Amazon Get Bill of Materials Import Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          required: true
        - name: jobId
          in: path
          type: string
          description: The job identifier
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_SUPPLY_CHAIN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-supply-chain-bill-of-materials-rest
    port: 8080
    description: REST adapter for AWS Supply Chain API — Bill of Materials. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/instances/{instanceid}/bill-of-materials-import-jobs
      name: api-instances-instanceid-bill-of-materials-import-jobs
      description: REST surface for api-instances-instanceId-bill-of-materials-import-jobs.
      operations:
      - method: POST
        name: createbillofmaterialsimportjob
        description: Amazon Create Bill of Materials Import Job
        call: amazon-supply-chain-bill-of-materials.createbillofmaterialsimportjob
        with:
          instanceId: rest.instanceId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/instances/{instanceid}/bill-of-materials-import-jobs/{jobid}
      name: api-instances-instanceid-bill-of-materials-import-jobs-jobid
      description: REST surface for api-instances-instanceId-bill-of-materials-import-jobs-jobId.
      operations:
      - method: GET
        name: getbillofmaterialsimportjob
        description: Amazon Get Bill of Materials Import Job
        call: amazon-supply-chain-bill-of-materials.getbillofmaterialsimportjob
        with:
          instanceId: rest.instanceId
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-supply-chain-bill-of-materials-mcp
    port: 9090
    transport: http
    description: MCP adapter for AWS Supply Chain API — Bill of Materials. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-create-bill-materials-import
      description: Amazon Create Bill of Materials Import Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-supply-chain-bill-of-materials.createbillofmaterialsimportjob
      with:
        instanceId: tools.instanceId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-get-bill-materials-import
      description: Amazon Get Bill of Materials Import Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-supply-chain-bill-of-materials.getbillofmaterialsimportjob
      with:
        instanceId: tools.instanceId
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
