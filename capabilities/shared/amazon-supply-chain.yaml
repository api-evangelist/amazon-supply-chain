naftiko: 1.0.0-alpha1
info:
  label: AWS Supply Chain API
  description: AWS Supply Chain service for managing instances, data integration flows, data lakes, and bills of materials.
  tags:
  - Amazon
  - AWS
  - Supply Chain
  - Logistics
  - Machine Learning
  - ERP Integration
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: amazon-supply-chain
    baseUri: https://scn.amazonaws.com
    description: AWS Supply Chain REST API.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGNATURE_V4}}'
      placement: header
    resources:
    - name: instances
      path: /api/instances
      description: Supply chain instances
      operations:
      - name: list-instances
        method: GET
        description: List supply chain instances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-instance
        method: POST
        description: Create a supply chain instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-integration-flows
      path: /api/instances/{instanceId}/data-integration-flows
      description: Data integration flows
      operations:
      - name: list-flows
        method: GET
        description: List data integration flows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-flow
        method: PUT
        description: Create data integration flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-lake-datasets
      path: /api/instances/{instanceId}/namespaces/{namespace}/datasets
      description: Data lake datasets
      operations:
      - name: list-datasets
        method: GET
        description: List data lake datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-supply-chain-rest
    resources:
    - path: /v1/instances
      name: instances
      description: Supply chain instance management
      operations:
      - method: GET
        name: list-instances
        description: List instances
        call: amazon-supply-chain.list-instances
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/flows
      name: flows
      description: Data integration flows
      operations:
      - method: GET
        name: list-flows
        description: List flows
        call: amazon-supply-chain.list-flows
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-supply-chain-mcp
    transport: http
    description: MCP server for AI-assisted supply chain management.
    tools:
    - name: list-instances
      description: List AWS Supply Chain instances
      hints:
        readOnly: true
        openWorld: true
      call: amazon-supply-chain.listinstances
      outputParameters:
      - type: object
        mapping: $.
    - name: create-instance
      description: Create a supply chain instance
      hints:
        readOnly: false
      call: amazon-supply-chain.createinstance
      outputParameters:
      - type: object
        mapping: $.
    - name: get-instance
      description: Get supply chain instance details
      hints:
        readOnly: true
        idempotent: true
      call: amazon-supply-chain.getinstance
      outputParameters:
      - type: object
        mapping: $.
    - name: list-data-integration-flows
      description: List data integration flows
      hints:
        readOnly: true
        openWorld: true
      call: amazon-supply-chain.listdataintegrationflows
      outputParameters:
      - type: object
        mapping: $.
    - name: create-data-integration-flow
      description: Create a data integration flow
      hints:
        readOnly: false
      call: amazon-supply-chain.createdataintegrationflow
      outputParameters:
      - type: object
        mapping: $.
    - name: list-data-lake-datasets
      description: List data lake datasets
      hints:
        readOnly: true
        openWorld: true
      call: amazon-supply-chain.listdatalatedatasets
      outputParameters:
      - type: object
        mapping: $.
    - name: send-data-integration-event
      description: Send a data integration event
      hints:
        readOnly: false
      call: amazon-supply-chain.senddataintegrationevent
      outputParameters:
      - type: object
        mapping: $.
    - name: create-bom-import-job
      description: Create a bill of materials import job
      hints:
        readOnly: false
      call: amazon-supply-chain.createbillofmaterialsimportjob
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bom-import-job
      description: Get bill of materials import job status
      hints:
        readOnly: true
        idempotent: true
      call: amazon-supply-chain.getbillofmaterialsimportjob
      outputParameters:
      - type: object
        mapping: $.
